name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gdtoolkit
        run: python -m pip install --upgrade pip gdtoolkit==4.5.0

      - name: Check GDScript formatting
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ./tools/run_gdscript_quality.sh format

      - name: Lint GDScript
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ./tools/run_gdscript_quality.sh lint

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.1
          use-dotnet: false
          include-templates: false

      - name: Validate project load
        run: godot --headless --path . --quit

      - name: Run GUT test suite
        run: godot --headless --path . -s addons/gut/gut_cmdln.gd -gdir=res://tests -ginclude_subdirs -gexit
